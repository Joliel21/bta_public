name: Generate static share pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "public/content/**"
      - "public/images/**"
      - "scripts/generate-share-pages.mjs"

permissions:
  contents: write

jobs:
  generate-share-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run generate:share
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate static share pages"
          file_pattern: public/share/**/*
