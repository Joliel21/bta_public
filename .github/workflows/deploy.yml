name: Deploy bta_public Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bta-public-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy public folder to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm public folder exists
        run: |
          test -d public
          touch public/.nojekyll
          if [ ! -f public/index.html ]; then
            printf '%s\n' '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BTA Public Content</title></head><body><h1>BTA Public Content</h1><p><a href="./content/issue.json">Open issue.json</a></p></body></html>' > public/index.html
          fi

      - name: Upload public folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
