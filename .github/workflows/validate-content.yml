name: Validate BTA public content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "public/**"
      - "scripts/**"
      - ".github/workflows/validate-content.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run validate
