name: Deploy bta_public Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

permissions:
  contents: write

concurrency:
  group: bta-public-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy public folder to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate

      - name: Generate static share pages
        run: npm run generate-share-pages

      - name: Prepare Pages files
        run: |
          touch public/.nojekyll
          if [ ! -f public/index.html ]; then
            cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Breathtaking Awareness Magazine Content</title>
          </head>
          <body>
            <h1>Breathtaking Awareness Magazine Content</h1>
            <p>This repository hosts public magazine content files.</p>
            <p><a href="./content/issue.json">Open issue.json</a></p>
          </body>
          </html>
          HTML
          fi

      - name: Deploy public folder to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
